<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>지하실 HTML Edition - 오늘의 소식</title>
    <meta name="description" content="지하실 오늘의 소식 정적 HTML 버전" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="recap">
    <div class="shell">
      <header class="hero hero-compact">
        <div class="hero-copy">
          <p class="eyebrow">Today Feed</p>
          <h1>오늘의 소식</h1>
          <p class="hero-text">오늘 시작한 방송과 네이버 카페 글을 중심으로 빠르게 훑어보는 정적 페이지입니다.</p>
        </div>
      </header>

      <nav class="topnav">
        <a class="nav-link" href="./index.html">홈</a>
        <a class="nav-link is-active" href="./recap.html">오늘의 소식</a>
        <a class="nav-link" href="./clips.html">클립</a>
      </nav>

      <main class="single-column">
        <section class="panel">
          <div class="stats-row" data-recap-stats>
            <div class="stat-card">
              <span class="stat-label">방송</span>
              <strong data-recap-session-count>0</strong>
            </div>
            <div class="stat-card">
              <span class="stat-label">글</span>
              <strong data-recap-post-count>0</strong>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Sessions</p>
              <h2>오늘 시작한 방송</h2>
            </div>
          </div>
          <div class="summary-grid" data-recap-session-grid>
            <div class="empty-card">오늘 방송 데이터를 불러오는 중입니다.</div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Posts</p>
              <h2>오늘 올라온 글</h2>
            </div>
          </div>
          <div class="news-grid" data-recap-post-grid>
            <div class="empty-card">오늘 글 데이터를 불러오는 중입니다.</div>
          </div>
        </section>
      </main>
    </div>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
